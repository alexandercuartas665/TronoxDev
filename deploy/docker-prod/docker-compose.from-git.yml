# =========================================================================
#  Stack de PRODUCCION de TRONOX.tareas - variante BUILD-FROM-GIT.
#
#  El servidor Linux clona la rama indicada del repo PUBLICO
#  https://github.com/alexandercuartas665/TronoxV.git y construye la imagen
#  ahi mismo. No se necesita registry (GHCR) ni subir codigo desde tu maquina.
#
#  Aislamiento (conviven con Visal u otros stacks en el mismo Docker):
#    - project name    : tronox-prod  (prefija volumenes y red)
#    - contenedores     : tronox-app / tronox-postgres-prod
#    - volumen de datos : tronox-pgdata     (PERSISTENTE, propio, no se comparte)
#    - volumen de subidas: tronox-uploads   (PERSISTENTE, archivos de usuarios)
#    - red              : tronox-net
#
#  Requisitos en el server:
#    - Docker Engine 24+ con Compose v2 (BuildKit por defecto).
#    - Salida HTTPS a github.com:443.
#    - ~3 GB libres para la imagen (.NET SDK + runtime + Chromium).
#
#  Uso en el server:
#    1) mkdir -p /opt/tronox && cd /opt/tronox
#    2) Copiar aqui: docker-compose.from-git.yml  y  .env (basado en .env.example)
#    3) docker compose -f docker-compose.from-git.yml build     # ~5-10 min la 1a vez
#    4) docker compose -f docker-compose.from-git.yml up -d
#    5) curl http://127.0.0.1:${TRONOX_PORT}/login  -> debe devolver el HTML del login
#    6) Enrutar el ingreso HTTPS (una de dos):
#       a) Apuntar tu reverse proxy global (nginx-proxy-manager/traefik/caddy)
#          a http://127.0.0.1:${TRONOX_PORT} con WebSockets habilitados, o
#       b) Levantar el Caddy incluido (ver carpeta caddy/) SOLO si 80/443
#          estan libres en el server.
#
#  Updates (tras un commit nuevo en la rama):
#    docker compose -f docker-compose.from-git.yml build --no-cache
#    docker compose -f docker-compose.from-git.yml up -d
# =========================================================================

name: tronox-prod

services:
  tronox-app:
    # Build directo desde el repo publico, en la rama de TRONOX_BRANCH (.env).
    # Sintaxis git context: <url>#<ref>  (ref = branch, tag o commit sha).
    # Nota: mientras main no este mergeado, la rama viva es fase-0/clon-backbone.
    build:
      context: "https://github.com/alexandercuartas665/TronoxV.git#${TRONOX_BRANCH:-fase-0/clon-backbone}"
      dockerfile: apps/backend/Dockerfile.superadmin
    image: tronox-superadmin:local
    container_name: tronox-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_HTTP_PORTS: 8080
      # DAL dual: en produccion elegimos Postgres (el servicio interno de abajo).
      TRONOX_DB_PROVIDER: Postgres
      TRONOX_DB_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Aplica migraciones EF al arrancar (idempotente). En Production NO corren solas.
      TRONOX_RUN_MIGRATIONS: "true"
      # Clave del primer Super Admin (admin@tronox.local) que se crea en Production.
      # Sin datos demo: el sistema arranca limpio y con este admin.
      TRONOX_SEED_ADMIN_PASSWORD: "${TRONOX_SEED_ADMIN_PASSWORD}"
      # Confianza al proxy/Caddy que termina TLS por delante.
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    ports:
      # Expuesto en todas las interfaces del host (HTTP plano), igual que las
      # demas apps de este box (Visal en 5380). Hoy 10.0.0.3 NO tiene reverse
      # proxy ni TLS activo. Si mas adelante montas un proxy/Caddy delante,
      # cambia esto a "127.0.0.1:${TRONOX_PORT:-5480}:8080".
      - "${TRONOX_PORT:-5480}:8080"
    volumes:
      # ---------------------------------------------------------------------
      # ARCHIVOS SUBIDOS POR LOS USUARIOS - VOLUMEN OBLIGATORIO.
      #
      # POR QUE EXISTE: la app guarda los binarios que sube el usuario en el
      # SISTEMA DE ARCHIVOS del contenedor, bajo wwwroot/uploads (logo de marca,
      # imagenes de items, avatares, adjuntos de chat, archivos de leads, PDFs de
      # cotizaciones, recursos de agentes, plantillas...). En la BD solo queda la
      # RUTA (p.ej. /uploads/items/{tenant}/x.png), no el binario.
      # El update rutinario es "build --no-cache" + "up -d", que RECREA el
      # contenedor: sin este volumen el sistema de archivos se pierde entero y
      # todas esas imagenes quedan rotas (404) en cada despliegue. Ya paso.
      #
      # RUTA: el Dockerfile (apps/backend/Dockerfile.superadmin) usa WORKDIR /app
      # y copia ahi el publish, asi que el wwwroot servido es /app/wwwroot y el
      # directorio de subidas es /app/wwwroot/uploads.
      #
      # OJO al primer "up": hay 17 archivos de demo versionados en git dentro de
      # wwwroot/uploads que viajan en la imagen. Docker, al CREAR un volumen con
      # nombre vacio, copia dentro el contenido que la imagen trae en ese path,
      # asi que esos 17 sobreviven. Pero eso pasa UNA sola vez: archivos nuevos
      # que se agreguen al repo bajo wwwroot/uploads NO llegaran a un volumen ya
      # creado. Si algun dia hace falta, copiarlos a mano:
      #   docker cp <archivo> tronox-app:/app/wwwroot/uploads/<subcarpeta>/
      - tronox-uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tronox-net
    # Sin healthcheck explicito de la app: el runtime aspnet (Debian slim) no
    # garantiza wget/curl. La app queda gobernada por restart: unless-stopped y
    # el reverse proxy (o Caddy) hace su propio probe HTTP contra /login.

  postgres:
    image: postgres:16-alpine
    container_name: tronox-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Volumen PERSISTENTE y propio de TRONOX (no se comparte con Visal).
      - tronox-pgdata:/var/lib/postgresql/data
    networks:
      - tronox-net
    # En produccion NO publicamos Postgres al host: solo la red interna.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  tronox-pgdata:
  # Archivos subidos por los usuarios (wwwroot/uploads). PERSISTENTE: sin el,
  # cada "build --no-cache" + "up -d" borra todo lo que subieron los clientes.
  # No lo elimines con "docker compose down -v": eso destruye BD Y archivos.
  tronox-uploads:

networks:
  tronox-net:
    driver: bridge
