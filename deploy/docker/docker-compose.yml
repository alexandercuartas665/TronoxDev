# Stack de desarrollo de TRONOX SGDEA.
#
# La maquina de desarrollo corre en paralelo varios stacks hermanos (ecorex-tareas, doktrino,
# cubot, cubot-travels, cubotrm, visal, propia, traiding). Por eso TRONOX usa un BLOQUE DE
# PUERTOS DEDICADO, nombre de proyecto propio y red propia: ningun contenedor hermano debe
# caerse al levantar este stack. Los puertos se parametrizan en .env (no versionado).
#
# Antes de "docker compose up" corre SIEMPRE deploy/docker/preflight.ps1.

name: tronox

services:
  postgres:
    image: postgres:16-alpine
    container_name: tronox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5443}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tronox-net

  redis:
    image: redis:7-alpine
    container_name: tronox-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6390}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tronox-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tronox-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5683}:5672"
      - "${RABBITMQ_MGMT_PORT:-15683}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - tronox-net

  # Object storage S3-compatible. Es especifico de TRONOX: las specs prohiben BLOB en base
  # de datos, asi que TODO binario (documentos, anexos, imagenes de firma) vive aqui.
  minio:
    image: minio/minio:latest
    container_name: tronox-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9004}:9000"
      - "${MINIO_CONSOLE_PORT:-9005}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - tronox-net

  adminer:
    image: adminer:latest
    container_name: tronox-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8093}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tronox-net

# Con "name: tronox" los volumenes quedan prefijados (tronox_postgres-data) y no se
# mezclan con los de los stacks hermanos.
volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  tronox-net:
    name: tronox-net
    driver: bridge
